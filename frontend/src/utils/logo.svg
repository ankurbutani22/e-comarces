<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Cinzel:wght@600&amp;display=swap');
    </style>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8A820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C47E10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4920F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shopping Bag Icon -->
  <!-- Bag body -->
  <rect x="10" y="28" width="44" height="38" rx="4" ry="4" fill="url(#bagGrad)" />
  <!-- Bag handle left curve -->
  <path d="M20 28 C20 15 44 15 44 28" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Decorative star/sparkle on bag -->
  <circle cx="32" cy="45" r="4" fill="#1a4a3a" opacity="0.5"/>
  <text x="32" y="49" text-anchor="middle" font-size="8" fill="#1a4a3a" font-family="serif" font-weight="bold">★</text>

  <!-- Brand Name -->
  <!-- APNA -->
  <text
    x="64" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="bold"
    letter-spacing="5"
    fill="url(#goldGrad)"
  >APNA</text>

  <!-- Decorative thin gold line under APNA -->
  <line x1="64" y1="47" x2="188" y2="47" stroke="#E8A820" stroke-width="0.8" opacity="0.6"/>

  <!-- BAZAAR -->
  <text
    x="64" y="66"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="bold"
    letter-spacing="4"
    fill="white"
  >BAZAAR</text>

  <!-- Small decorative dots -->
  <circle cx="64" cy="47" r="2" fill="#F5C842"/>
  <circle cx="188" cy="47" r="2" fill="#F5C842"/>
</svg>
